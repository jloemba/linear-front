name: Frontend CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Étape 1 : Vérification de la syntaxe et de la compilation
  setup-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint (ESLint)
        run: npm run lint

      - name: Run Build test
        run: npm run build

  # Étape 2 : Exécution des tests (seulement si le build/lint passe)
  test-suite:
    runs-on: ubuntu-latest
    needs: setup-and-verify # Bloque ce job si le précédent échoue
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all tests (unit, hooks, integration)
        run: npm test -- --coverage
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          
  e2e-tests:
      runs-on: ubuntu-latest
      needs: test-suite
      strategy:
        fail-fast: false
        matrix:
          # On divise les tests en 4 morceaux (shards)
          shard: [1, 2, 3, 4]
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'

        - name: Install dependencies
          run: npm ci

        - name: Get Playwright version
          id: playwright-version
          run: echo "version=$(npm list @playwright/test | grep @playwright/test | sed 's/.*@//')" >> $GITHUB_OUTPUT

        - name: Cache Playwright browsers
          id: playwright-cache
          uses: actions/cache@v4
          with:
            path: ~/.cache/ms-playwright
            key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

        - name: Install Playwright browsers
          if: steps.playwright-cache.outputs.cache-hit != 'true'
          run: npx playwright install --with-deps

        - name: Run Playwright E2E tests
          run: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}
          env:
            CI: true

        - name: Upload Playwright report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: playwright-report-${{ matrix.shard }}
            path: playwright-report/
            retention-days: 7